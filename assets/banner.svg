<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    
    <linearGradient id="accent-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>

    <!-- Flow Gradients -->
    <linearGradient id="flow-cyan-emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    
    <linearGradient id="flow-purple-emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <linearGradient id="flow-emerald-emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="fade-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#f87171" stop-opacity="0" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#020617" flood-opacity="0.7" />
    </filter>

    <!-- Glow Blur Filter -->
    <filter id="glow-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50" />
    </filter>
  </defs>

  <!-- 1. Background Fill -->
  <rect width="1280" height="320" fill="url(#bg-gradient)" />
  <rect width="1280" height="320" fill="url(#grid)" />

  <!-- 2. Atmospheric Glowing Orbs -->
  <circle cx="340" cy="160" r="180" fill="#06b6d4" opacity="0.1" filter="url(#glow-blur)" />
  <circle cx="660" cy="140" r="140" fill="#8b5cf6" opacity="0.08" filter="url(#glow-blur)" />
  <circle cx="960" cy="180" r="180" fill="#10b981" opacity="0.1" filter="url(#glow-blur)" />

  <!-- 3. Faint Network Constellation Background -->
  <g opacity="0.15">
    <line x1="80" y1="60" x2="220" y2="40" stroke="#94a3b8" stroke-width="1" />
    <line x1="220" y1="40" x2="260" y2="120" stroke="#94a3b8" stroke-width="1" />
    <line x1="1020" y1="280" x2="1140" y2="240" stroke="#94a3b8" stroke-width="1" />
    <line x1="1140" y1="240" x2="1220" y2="290" stroke="#94a3b8" stroke-width="1" />
    <circle cx="80" cy="60" r="3" fill="#38bdf8" />
    <circle cx="220" cy="40" r="2.5" fill="#a78bfa" />
    <circle cx="260" cy="120" r="2" fill="#34d399" />
    <circle cx="1020" cy="280" r="2" fill="#a78bfa" />
    <circle cx="1140" cy="240" r="3" fill="#34d399" />
    <circle cx="1220" cy="290" r="2.5" fill="#38bdf8" />
  </g>

  <!-- 4. Extraction Flows (Active Connection Streams) -->
  <g>
    <!-- Flow 1 (Cyan / Title Stream) -->
    <path d="M 500,112 C 550,112 610,132 660,132" fill="none" stroke="url(#flow-cyan-emerald)" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.8" />
    <path d="M 660,132 C 710,132 770,124 820,124" fill="none" stroke="url(#flow-cyan-emerald)" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.8" />
    <!-- Flow 1 Particles -->
    <circle cx="540" cy="112" r="4" fill="#38bdf8" />
    <circle cx="750" cy="128" r="4" fill="#34d399" />

    <!-- Flow 2 (Purple / Content Stream) -->
    <path d="M 500,164 C 550,164 590,160 632,160" fill="none" stroke="url(#flow-purple-emerald)" stroke-width="3" opacity="0.85" />
    <path d="M 688,160 C 730,160 770,172 820,172" fill="none" stroke="url(#flow-purple-emerald)" stroke-width="3" opacity="0.85" />
    <!-- Flow 2 Particles -->
    <circle cx="560" cy="164" r="5" fill="#a78bfa" />
    <circle cx="745" cy="165" r="5" fill="#34d399" />

    <!-- Flow 3 (Green / Links Stream) -->
    <path d="M 500,242 C 550,242 610,188 660,188" fill="none" stroke="url(#flow-emerald-emerald)" stroke-width="2" stroke-dasharray="6 3" opacity="0.8" />
    <path d="M 660,188 C 710,188 770,244 820,244" fill="none" stroke="url(#flow-emerald-emerald)" stroke-width="2" stroke-dasharray="6 3" opacity="0.8" />
    <!-- Flow 3 Particles -->
    <circle cx="575" cy="223" r="4" fill="#34d399" />
    <circle cx="725" cy="208" r="4" fill="#34d399" />

    <!-- Flow 4 (Red / Blocked Ad Stream) -->
    <path d="M 500,180 C 535,180 545,230 520,260" fill="none" stroke="url(#fade-red)" stroke-width="2.5" stroke-dasharray="3 3" />
    <!-- Trash Filter node (Red cross badge) -->
    <g transform="translate(510, 250)">
      <circle cx="10" cy="10" r="9" fill="#ef4444" opacity="0.15" />
      <circle cx="10" cy="10" r="7" fill="none" stroke="#f87171" stroke-width="1.5" />
      <path d="M 7,7 L 13,13 M 13,7 L 7,13" stroke="#f87171" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Anchors on Card Edges -->
    <circle cx="500" cy="112" r="3.5" fill="#38bdf8" />
    <circle cx="500" cy="164" r="3.5" fill="#a78bfa" />
    <circle cx="500" cy="242" r="3.5" fill="#34d399" />
    <circle cx="820" cy="124" r="3.5" fill="#38bdf8" />
    <circle cx="820" cy="172" r="3.5" fill="#a78bfa" />
    <circle cx="820" cy="244" r="3.5" fill="#34d399" />
  </g>

  <!-- 5. Central Processing Hub (Scraper Engine) -->
  <g>
    <!-- Outer Glow -->
    <circle cx="660" cy="160" r="50" fill="#38bdf8" opacity="0.08" filter="url(#glow-blur)" />
    <!-- Outer Orbits -->
    <circle cx="660" cy="160" r="38" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" stroke-dasharray="5 5" />
    <circle cx="660" cy="160" r="28" fill="none" stroke="url(#accent-cyan)" stroke-width="1.5" stroke-dasharray="160 30" opacity="0.6" />
    <!-- Engine Core -->
    <circle cx="660" cy="160" r="22" fill="#090d16" stroke="url(#accent-emerald)" stroke-width="2" />
    <!-- Extractor Icon inside Core -->
    <path d="M 660,148 L 660,172 M 653,165 L 660,172 L 667,165" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Hub Orbit Nodes -->
    <circle cx="660" cy="132" r="3.5" fill="#38bdf8" />
    <circle cx="660" cy="188" r="3.5" fill="#34d399" />
    <circle cx="632" cy="160" r="3.5" fill="#a78bfa" />
    <circle cx="688" cy="160" r="3.5" fill="#34d399" />
  </g>

  <!-- 6. Left Card: Stylized Web Browser / HTML Source -->
  <g transform="translate(180, 40)" filter="url(#shadow)">
    <!-- Base Card Frame -->
    <rect width="320" height="240" rx="12" fill="#090d16" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
    
    <clipPath id="left-card-clip">
      <rect width="320" height="240" rx="12" />
    </clipPath>
    
    <!-- Card Content Wrapper -->
    <g clip-path="url(#left-card-clip)">
      <!-- Browser Top Header Bar -->
      <rect width="320" height="36" fill="rgba(255, 255, 255, 0.02)" />
      <line x1="0" y1="36" x2="320" y2="36" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" />
      
      <!-- Browser Controls (Window Dots) -->
      <circle cx="20" cy="18" r="4.5" fill="#f87171" opacity="0.8" />
      <circle cx="32" cy="18" r="4.5" fill="#fbbf24" opacity="0.8" />
      <circle cx="44" cy="18" r="4.5" fill="#34d399" opacity="0.8" />
      
      <!-- Mock URL Bar -->
      <rect x="64" y="8" width="200" height="20" rx="10" fill="rgba(255, 255, 255, 0.05)" />
      <!-- Lock icon path -->
      <path d="M 76,17 L 76,21 A 1,1 0 0,0 77,22 L 81,22 A 1,1 0 0,0 82,21 L 82,17 A 1,1 0 0,0 81,16 L 77,16 A 1,1 0 0,0 76,17 Z M 78,16 V 14 A 1.5,1.5 0 0,1 80,14 V 16" fill="none" stroke="#64748b" stroke-width="1" stroke-linecap="round" />
      <!-- Address text placeholder -->
      <rect x="90" y="16" width="110" height="4" rx="2" fill="#38bdf8" opacity="0.35" />

      <!-- Page DOM / Nodes Structure -->
      <!-- Node 1: Header (Cyan Tag) -->
      <g transform="translate(16, 52)">
        <rect width="288" height="40" rx="6" fill="rgba(56, 189, 248, 0.02)" stroke="rgba(56, 189, 248, 0.15)" stroke-width="1.2" />
        <!-- Tag Badge -->
        <rect x="12" y="12" width="32" height="16" rx="4" fill="#38bdf8" />
        <line x1="18" y1="20" x2="38" y2="20" stroke="#090d16" stroke-width="2" stroke-linecap="round" />
        <!-- Content lines -->
        <rect x="56" y="14" width="160" height="6" rx="3" fill="#e2e8f0" opacity="0.85" />
        <rect x="56" y="24" width="100" height="4" rx="2" fill="#64748b" opacity="0.6" />
      </g>

      <!-- Node 2: Content Text Block (Purple Tag) -->
      <g transform="translate(16, 104)">
        <rect width="200" height="68" rx="6" fill="rgba(167, 139, 250, 0.02)" stroke="rgba(167, 139, 250, 0.15)" stroke-width="1.2" />
        <!-- Tag Badge -->
        <rect x="12" y="12" width="32" height="16" rx="4" fill="#a78bfa" />
        <line x1="18" y1="20" x2="38" y2="20" stroke="#090d16" stroke-width="2" stroke-linecap="round" />
        <!-- Content lines -->
        <rect x="56" y="18" width="120" height="5" rx="2.5" fill="#e2e8f0" opacity="0.8" />
        <rect x="12" y="38" width="176" height="4" rx="2" fill="#64748b" opacity="0.6" />
        <rect x="12" y="48" width="140" height="4" rx="2" fill="#64748b" opacity="0.6" />
      </g>

      <!-- Node 3: Ad / Sidebar (Red dashed, representing filtered noise) -->
      <g transform="translate(228, 104)">
        <rect width="76" height="116" rx="6" fill="rgba(248, 113, 113, 0.01)" stroke="rgba(248, 113, 113, 0.15)" stroke-width="1.2" stroke-dasharray="3 3" />
        <!-- Tag Badge -->
        <rect x="12" y="12" width="24" height="14" rx="3" fill="#f87171" opacity="0.6" />
        <line x1="17" y1="19" x2="31" y2="19" stroke="#090d16" stroke-width="2" stroke-linecap="round" />
        <!-- Cross-out overlay -->
        <path d="M 20,44 L 56,80 M 56,44 L 20,80" stroke="#f87171" stroke-width="2" stroke-linecap="round" opacity="0.4" />
        <!-- Internal mock block layout -->
        <rect x="16" y="38" width="44" height="66" rx="3" fill="none" stroke="rgba(248, 113, 113, 0.08)" stroke-width="1" stroke-dasharray="1 2" />
      </g>

      <!-- Node 4: Links Container (Green Tag) -->
      <g transform="translate(16, 184)">
        <rect width="200" height="36" rx="6" fill="rgba(52, 211, 153, 0.02)" stroke="rgba(52, 211, 153, 0.15)" stroke-width="1.2" />
        <!-- Tag Badge -->
        <rect x="12" y="10" width="32" height="16" rx="4" fill="#34d399" />
        <line x1="18" y1="18" x2="38" y2="18" stroke="#090d16" stroke-width="2" stroke-linecap="round" />
        <!-- Link line -->
        <rect x="56" y="16" width="110" height="4" rx="2" fill="#34d399" opacity="0.7" />
      </g>
    </g>
  </g>

  <!-- 7. Right Card: Clean Structured Data Output -->
  <g transform="translate(820, 40)" filter="url(#shadow)">
    <!-- Base Card Frame -->
    <rect width="280" height="240" rx="12" fill="#090d16" stroke="rgba(52, 211, 153, 0.3)" stroke-width="1.5" />
    
    <clipPath id="right-card-clip">
      <rect width="280" height="240" rx="12" />
    </clipPath>
    
    <!-- Card Content Wrapper -->
    <g clip-path="url(#right-card-clip)">
      <!-- Tab Header Bar -->
      <rect width="280" height="32" fill="rgba(52, 211, 153, 0.04)" />
      <line x1="0" y1="32" x2="280" y2="32" stroke="rgba(52, 211, 153, 0.15)" stroke-width="1" />
      
      <!-- Active Tab Indicator -->
      <circle cx="18" cy="16" r="4.5" fill="#34d399" />
      <rect x="30" y="12" width="70" height="8" rx="4" fill="#34d399" opacity="0.3" />
      <!-- Close tab button representation -->
      <path d="M 112,13 L 118,19 M 118,13 L 112,19" stroke="#64748b" stroke-width="1" stroke-linecap="round" />

      <!-- Hierarchical Tree Representation of Structured Data (no text characters) -->
      <g transform="translate(24, 48)">
        <!-- Vertical hierarchy connector line -->
        <path d="M 12,12 L 12,156" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" stroke-linecap="round" />
        
        <!-- Root Node Circle -->
        <circle cx="12" cy="12" r="3.5" fill="#38bdf8" />
        
        <!-- Field 1: Cyan (extracted Title) -->
        <g transform="translate(0, 24)">
          <path d="M 12,12 L 28,12" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" />
          <circle cx="28" cy="12" r="3" fill="#38bdf8" />
          <!-- Key Capsule -->
          <rect x="38" y="4" width="40" height="16" rx="4" fill="rgba(56, 189, 248, 0.15)" stroke="#38bdf8" stroke-width="1" />
          <line x1="46" y1="12" x2="70" y2="12" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
          <!-- Separator Colon Dots -->
          <circle cx="86" cy="10" r="1.5" fill="#64748b" />
          <circle cx="86" cy="14" r="1.5" fill="#64748b" />
          <!-- Value Block -->
          <rect x="96" y="7" width="110" height="10" rx="3" fill="#e2e8f0" opacity="0.85" />
        </g>

        <!-- Field 2: Purple (extracted Content) -->
        <g transform="translate(0, 72)">
          <path d="M 12,12 L 28,12" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" />
          <circle cx="28" cy="12" r="3" fill="#a78bfa" />
          <!-- Key Capsule -->
          <rect x="38" y="4" width="40" height="16" rx="4" fill="rgba(167, 139, 250, 0.15)" stroke="#a78bfa" stroke-width="1" />
          <line x1="46" y1="12" x2="70" y2="12" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
          <!-- Separator Colon Dots -->
          <circle cx="86" cy="10" r="1.5" fill="#64748b" />
          <circle cx="86" cy="14" r="1.5" fill="#64748b" />
          
          <!-- Nested sub-structure -->
          <path d="M 96,16 L 96,52" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.2" stroke-linecap="round" />
          <g transform="translate(96, 0)">
            <path d="M 0,26 L 10,26" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.2" />
            <rect x="14" y="21" width="100" height="10" rx="3" fill="#e2e8f0" opacity="0.7" />
            
            <path d="M 0,46 L 10,46" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.2" />
            <rect x="14" y="41" width="70" height="10" rx="3" fill="#e2e8f0" opacity="0.7" />
          </g>
        </g>

        <!-- Field 3: Green (extracted Link Array) -->
        <g transform="translate(0, 144)">
          <path d="M 12,12 L 28,12" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" />
          <circle cx="28" cy="12" r="3" fill="#34d399" />
          <!-- Key Capsule -->
          <rect x="38" y="4" width="40" height="16" rx="4" fill="rgba(52, 211, 153, 0.15)" stroke="#34d399" stroke-width="1" />
          <line x1="46" y1="12" x2="70" y2="12" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
          <!-- Separator Colon Dots -->
          <circle cx="86" cy="10" r="1.5" fill="#64748b" />
          <circle cx="86" cy="14" r="1.5" fill="#64748b" />
          
          <!-- Visual code bracket framing for array (no literal text characters) -->
          <!-- Left Bracket shape -->
          <path d="M 100,6 L 96,6 L 96,18 L 100,18" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" />
          <!-- Items inside -->
          <rect x="104" y="7" width="45" height="10" rx="3" fill="#34d399" opacity="0.75" />
          <rect x="153" y="7" width="45" height="10" rx="3" fill="#34d399" opacity="0.75" />
          <!-- Right Bracket shape -->
          <path d="M 202,6 L 206,6 L 206,18 L 202,18" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" />
        </g>
      </g>

      <!-- Successful Extraction Status Checkmark Badge -->
      <g transform="translate(232, 192)">
        <circle cx="16" cy="16" r="16" fill="#10b981" opacity="0.15" />
        <circle cx="16" cy="16" r="12" fill="#090d16" stroke="#34d399" stroke-width="2" />
        <path d="M 11,16 L 14,19 L 21,12" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>
  </g>
</svg>
